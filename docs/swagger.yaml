host: localhost:8083
info:
  contact: {}
  description: |-
    RADIUS server with HTTP management API.
    Management endpoints require the X-Internal-Secret header.
  title: radius-go API
  version: "1.0"
paths:
  /radius/nases:
    get:
      description: List all configured Network Access Servers
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_your-org_radius-go_internal_runtime.Envelope'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/github_com_your-org_radius-go_internal_domain.NAS'
                  type: array
              type: object
      security:
      - InternalSecret: []
      summary: List NAS devices
      tags:
      - NAS
    post:
      consumes:
      - application/json
      description: Register a new Network Access Server
      parameters:
      - description: NAS details
        in: body
        name: nas
        required: true
        schema:
          $ref: '#/definitions/github_com_your-org_radius-go_internal_domain.CreateNASRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/github_com_your-org_radius-go_internal_runtime.Envelope'
            - properties:
                data:
                  $ref: '#/definitions/github_com_your-org_radius-go_internal_domain.NAS'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_your-org_radius-go_internal_runtime.Envelope'
      security:
      - InternalSecret: []
      summary: Create NAS device
      tags:
      - NAS
  /radius/nases/{id}:
    delete:
      parameters:
      - description: NAS UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_your-org_radius-go_internal_runtime.Envelope'
      security:
      - InternalSecret: []
      summary: Delete NAS device
      tags:
      - NAS
    put:
      consumes:
      - application/json
      parameters:
      - description: NAS UUID
        in: path
        name: id
        required: true
        type: string
      - description: Updated NAS fields
        in: body
        name: nas
        required: true
        schema:
          $ref: '#/definitions/github_com_your-org_radius-go_internal_domain.UpdateNASRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_your-org_radius-go_internal_runtime.Envelope'
            - properties:
                data:
                  $ref: '#/definitions/github_com_your-org_radius-go_internal_domain.NAS'
              type: object
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_your-org_radius-go_internal_runtime.Envelope'
      security:
      - InternalSecret: []
      summary: Update NAS device
      tags:
      - NAS
  /radius/sessions:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_your-org_radius-go_internal_runtime.Envelope'
            - properties:
                data:
