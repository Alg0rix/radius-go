include:
  - ../docker-compose.yml

services:
  integration-test:
    build:
      context: ..
      dockerfile: tests/Dockerfile
    container_name: radius-go-integration-test
    depends_on:
      - radius-go
    environment:
      SERVER: "http://radius-go:8083"
      SECRET: "change-me-in-production"
      RADIUS_SERVER: "http://radius-go:8083"
      RADIUS_SECRET: "change-me-in-production"
      RADIUS_HOST: "radius-go"
    volumes:
      - ../scripts/integration-test.sh:/tests/integration-test.sh:ro
